<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Andrés Fajardo — Founder · CPO · Investor · Advisor">
  <title>Andrés Fajardo</title>

  <!-- Spline 3D web component -->
  <script type="module" src="https://unpkg.com/@splinetool/viewer/build/spline-viewer.js"></script>

  <!-- Chakra Petch (display) · Azeret Mono (labels) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@300;600&family=Azeret+Mono:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    ::selection {
      background: var(--accent);
      color: oklch(10% 0.010 65);
    }

    :root {
      --bg:     oklch(9% 0.012 65);
      --text:   oklch(87% 0.015 78);
      --dim:    oklch(56% 0.010 78);
      --accent: oklch(74% 0.135 82);
      --rule:   oklch(26% 0.008 68);
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: 'Azeret Mono', monospace;
    }

    /* Scanlines — DHARMA institutional texture */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent 0,
        transparent 3px,
        oklch(0% 0 0 / 0.028) 3px,
        oklch(0% 0 0 / 0.028) 4px
      );
      pointer-events: none;
      z-index: 300;
    }

    /* Vignette — depth toward edges */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at 62% 48%, transparent 38%, oklch(0% 0 0 / 0.58) 100%);
      pointer-events: none;
      z-index: 200;
    }

    /* ─── Spline scene ─── full-page background */
    .scene {
      position: fixed;
      inset: 0;
      z-index: 0;
      transition: transform 0.55s cubic-bezier(0.25, 0.46, 0.45, 0.94), filter 0.7s ease-out;
    }

    .scene--unlock {
      filter: hue-rotate(-12deg) saturate(1.25) brightness(1.06);
    }

    @media (max-width: 640px) {
      .scene { transform: scale(1.05); }
    }

    spline-viewer {
      width: 100%;
      height: 100%;
      display: block;
    }

    /* Directional veil — left-to-right on desktop so text is legible */
    .veil {
      position: fixed;
      inset: 0;
      background: linear-gradient(
        108deg,
        oklch(9% 0.012 65 / 0.97) 0%,
        oklch(9% 0.012 65 / 0.90) 28%,
        oklch(9% 0.012 65 / 0.45) 50%,
        transparent 68%
      );
      pointer-events: none;
      z-index: 10;
    }

    /* ─── Spotlight ─── follows cursor */
    #spotlight {
      position: fixed;
      width: 620px;
      height: 620px;
      border-radius: 50%;
      background: radial-gradient(
        circle at center,
        oklch(87% 0.015 78 / 0.15) 0%,
        oklch(87% 0.015 78 / 0.05) 45%,
        transparent 70%
      );
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 15;
      opacity: 0;
      will-change: left, top;
      transition: opacity 0.35s ease;
    }

    /* ─── Content ─── */
    .content {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: clamp(3rem, 7vw, 7.5rem);
      max-width: 56%;
      pointer-events: none;
    }

    .links a {
      pointer-events: auto;
    }

    /* Station label */
    .station-id {
      display: flex;
      align-items: center;
      gap: 0.85rem;
      margin-bottom: 2.75rem;
      font-size: clamp(0.72rem, 0.66rem + 0.18vw, 0.82rem);
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--dim);
    }

    .station-id::before {
      content: '';
      width: 1.75rem;
      height: 1px;
      background: var(--dim);
      flex-shrink: 0;
    }

    /* DHARMA hexagon mark */
    .hex-mark {
      margin-bottom: 1.75rem;
    }

    /* Name */
    h1 {
      font-family: 'Chakra Petch', sans-serif;
      font-size: clamp(3.75rem, 7.5vw, 7rem);
      font-weight: 600;
      line-height: 0.85;
      letter-spacing: -0.025em;
      text-transform: uppercase;
      color: var(--text);
      margin-bottom: 2rem;
    }

    /* Descriptor */
    .descriptor {
      font-size: clamp(0.78rem, 0.7rem + 0.24vw, 0.92rem);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--dim);
      margin-bottom: 2.5rem;
    }

    .sep { color: var(--accent); }

    /* Rule */
    .hr {
      width: 2.5rem;
      height: 1px;
      background: var(--rule);
      margin-bottom: 2rem;
    }

    /* Links */
    .links {
      display: flex;
      gap: 2rem;
      list-style: none;
    }

    .links a {
      font-size: clamp(0.76rem, 0.68rem + 0.22vw, 0.88rem);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--dim);
      text-decoration: none;
      transition: color 0.18s ease;
    }

    .links a:hover { color: var(--accent); }

    /* ─── Bottom signature ─── */
    .sig {
      position: fixed;
      bottom: 2.5rem;
      left: clamp(3rem, 7vw, 7.5rem);
      z-index: 50;
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }

    .sig p {
      font-size: clamp(0.64rem, 0.58rem + 0.16vw, 0.72rem);
      letter-spacing: 0.14em;
      line-height: 1.45;
      text-transform: uppercase;
      color: oklch(50% 0.009 75);
      font-variant-numeric: tabular-nums;
    }

    /* Bottom-right corner cover — sits over the Spline badge area */
    .corner-veil {
      position: fixed;
      bottom: 0;
      right: 0;
      width: 260px;
      height: 80px;
      background: radial-gradient(ellipse at 100% 100%, oklch(9% 0.012 65 / 0.96) 0%, transparent 68%);
      pointer-events: none;
      z-index: 100;
    }

    /* ─── Mobile ─── */
    @media (max-width: 640px) {
      /* Flip gradient to bottom-up so robot fills sky, content anchors at foot */
      .veil {
        background: linear-gradient(
          to top,
          oklch(9% 0.012 65 / 0.98) 0%,
          oklch(9% 0.012 65 / 0.93) 36%,
          oklch(9% 0.012 65 / 0.45) 60%,
          transparent 80%
        );
      }

      .content {
        justify-content: flex-end;
        max-width: 100%;
        padding: 2.5rem 2rem 6.5rem;
      }

      h1 { font-size: clamp(2.75rem, 15vw, 4rem); }
      .station-id { margin-bottom: 1.75rem; }
      .hex-mark { display: none; }
      .sig { bottom: 1.75rem; left: 2rem; }
    }

    /* ─── Seq trigger ─── */
    .seq-trigger {
      cursor: pointer;
      transition: color 0.22s ease;
      user-select: none;
    }
    .seq-trigger:hover { color: oklch(60% 0.009 75); }
    .seq-number { display: inline; transition: color 0.25s ease, text-shadow 0.25s ease; }
    .seq-number--lit { color: var(--accent) !important; text-shadow: 0 0 10px oklch(74% 0.135 82 / 0.55); }

    /* Flash overlay on reveal */
    .dharma-pulse {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 160;
      opacity: 0; background: var(--accent);
    }
    @keyframes dharma-flash {
      0%   { opacity: 0; }
      15%  { opacity: 0.07; }
      100% { opacity: 0; }
    }
    .dharma-pulse.is-active { animation: dharma-flash 0.85s ease-out forwards; }

    /* ─── DHARMA Terminal ─── */
    .dharma-terminal {
      position: fixed;
      bottom: 0; left: 50%;
      transform: translateX(-50%) translateY(110%);
      z-index: 250;
      width: min(560px, 92vw);
      background: oklch(10% 0.014 68 / 0.97);
      border: 1px solid var(--accent);
      border-bottom: none;
      font-family: 'Azeret Mono', monospace;
      padding: 1.25rem 1.65rem 1.45rem;
      pointer-events: auto;
      transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .dharma-terminal[data-state] { transform: translateX(-50%) translateY(0); }
    .dharma-terminal__hdr {
      font-size: clamp(0.56rem, 0.5rem + 0.16vw, 0.64rem);
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: var(--dim);
      margin-bottom: 1.2rem;
      padding-bottom: 0.7rem;
      border-bottom: 1px solid var(--rule);
    }
    .dharma-track {
      display: flex; align-items: center;
      gap: 0.45rem; flex-wrap: wrap;
      margin-bottom: 0.6rem;
    }
    .dharma-track__pfx {
      color: var(--accent);
      font-size: clamp(0.82rem, 0.76rem + 0.14vw, 0.9rem);
      line-height: 1;
      flex-shrink: 0;
    }
    .dharma-chip {
      font-size: clamp(0.72rem, 0.66rem + 0.16vw, 0.8rem);
      font-variant-numeric: tabular-nums;
      color: var(--accent);
      border: 1px solid oklch(74% 0.135 82 / 0.55);
      padding: 0.14em 0.48em;
      letter-spacing: 0.05em;
      line-height: 1.55;
    }
    .dharma-terminal__input {
      background: transparent; border: none; outline: none;
      color: var(--text);
      font-family: 'Azeret Mono', monospace;
      font-size: clamp(0.74rem, 0.68rem + 0.16vw, 0.82rem);
      font-variant-numeric: tabular-nums;
      caret-color: var(--accent);
      letter-spacing: 0.05em;
      width: 2.8ch;
      line-height: 1.55;
    }
    .dharma-terminal__input:disabled { opacity: 0; pointer-events: none; width: 0; }
    .dharma-hint {
      font-size: clamp(0.56rem, 0.5rem + 0.14vw, 0.64rem);
      letter-spacing: 0.18em;
      text-transform: uppercase; color: oklch(40% 0.007 72);
      margin-bottom: 1rem;
    }
    .dharma-hint__num { color: var(--dim); }
    @keyframes dharma-shake {
      0%, 100% { transform: translateX(0); }
      20%       { transform: translateX(-5px); }
      60%       { transform: translateX(5px); }
      80%       { transform: translateX(-2px); }
    }
    .dharma-shake { animation: dharma-shake 0.25s ease; }
    .dharma-initiate {
      display: block; width: 100%;
      background: none;
      border: 1px solid var(--accent);
      color: var(--accent);
      font-family: 'Azeret Mono', monospace;
      font-size: clamp(0.58rem, 0.52rem + 0.14vw, 0.66rem);
      letter-spacing: 0.24em;
      text-transform: uppercase; padding: 0.65em 1em;
      cursor: pointer;
      opacity: 0; transform: translateY(6px);
      transition: opacity 0.3s ease, transform 0.3s ease, background 0.18s ease, color 0.18s ease;
      pointer-events: none; margin-bottom: 0.85rem;
    }
    .dharma-initiate.is-visible { opacity: 1; transform: translateY(0); pointer-events: auto; }
    .dharma-initiate:hover { background: var(--accent); color: oklch(10% 0.010 65); }
    .dharma-esc {
      font-size: clamp(0.5rem, 0.46rem + 0.12vw, 0.58rem);
      letter-spacing: 0.16em;
      text-transform: uppercase; color: oklch(28% 0.006 68);
      text-align: center;
    }

    /* ─── DHARMA Personnel File ─── */
    .dharma-file {
      position: fixed;
      top: 50%; right: 0;
      transform: translateY(-50%) translateX(105%);
      z-index: 250;
      width: min(420px, 90vw);
      max-height: 80vh; overflow-y: auto;
      background: oklch(10% 0.014 68 / 0.97);
      border: 1px solid var(--accent); border-right: none;
      font-family: 'Azeret Mono', monospace;
      padding: 1.2rem 1.65rem 1.35rem;
      pointer-events: auto;
      transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.3s;
    }
    .dharma-file[data-state] { transform: translateY(-50%) translateX(0); }
    .dharma-file__hdr {
      font-size: clamp(0.54rem, 0.48rem + 0.14vw, 0.62rem);
      letter-spacing: 0.24em;
      text-transform: uppercase; color: var(--accent);
      margin-bottom: 1.1rem; padding-bottom: 0.7rem;
      border-bottom: 1px solid var(--rule);
    }
    .dharma-file__body {
      font-size: clamp(0.68rem, 0.62rem + 0.14vw, 0.76rem);
      line-height: 1.95;
      letter-spacing: 0.05em;
      color: var(--text);
      white-space: pre; margin-bottom: 1.25rem;
      min-height: 8.5em; font-family: 'Azeret Mono', monospace;
    }
    .dharma-ack {
      display: block; width: 100%;
      background: none; border: 1px solid var(--rule);
      color: var(--dim);
      font-family: 'Azeret Mono', monospace;
      font-size: clamp(0.54rem, 0.48rem + 0.14vw, 0.62rem);
      letter-spacing: 0.24em;
      text-transform: uppercase; padding: 0.5em 1em;
      cursor: pointer;
      transition: border-color 0.18s ease, color 0.18s ease;
    }
    .dharma-ack:hover { border-color: var(--accent); color: var(--accent); }

    @media (max-width: 640px) {
      .dharma-terminal { width: 100%; border-left: none; border-right: none; }
      .dharma-file {
        top: auto; bottom: 0; right: auto; left: 0;
        width: 100%; max-height: 68vh;
        border: none; border-top: 1px solid var(--accent);
        transform: translateY(110%);
        transition-delay: 0.3s;
      }
      .dharma-file[data-state] { transform: translateY(0); }
      .dharma-file__body {
        font-size: clamp(0.6rem, 0.54rem + 0.35vw, 0.68rem);
        letter-spacing: 0.035em;
        overflow-x: auto;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .dharma-terminal, .dharma-file, .dharma-pulse, .seq-number {
        transition: none !important; animation: none !important;
      }
      .dharma-initiate { transition: opacity 0.01s, transform 0.01s !important; }
    }

    /* ─── π corner trigger ─── */
    .pi-trigger {
      position: fixed;
      bottom: 2.5rem;
      right: clamp(3rem, 7vw, 7.5rem);
      z-index: 110;
      font-family: 'Chakra Petch', sans-serif;
      font-size: 1.05rem;
      font-weight: 300;
      line-height: 1;
      color: var(--dim);
      text-decoration: none;
      padding: 0.5rem;
      transition: color 0.22s ease, text-shadow 0.22s ease;
    }
    .pi-trigger:hover,
    .pi-trigger:focus-visible {
      color: var(--accent);
      text-shadow: 0 0 14px oklch(74% 0.135 82 / 0.5);
      outline: none;
    }
    @media (max-width: 640px) {
      .pi-trigger {
        bottom: 1.75rem;
        right: 2rem;
        font-size: 0.95rem;
      }
    }
  </style>
</head>

  <script>
    // Remove Spline watermark from shadow DOM once the viewer loads
    (function () {
      const viewer = document.querySelector('spline-viewer');
      function purge() {
        const logo = viewer.shadowRoot && viewer.shadowRoot.querySelector('#logo');
        if (logo) { logo.remove(); return true; }
        return false;
      }
      viewer.addEventListener('load', () => { purge(); });
      let n = 0;
      const t = setInterval(() => { if (purge() || ++n > 20) clearInterval(t); }, 300);
    })();

    // Spotlight — follows cursor
    const spotlight = document.getElementById('spotlight');
    let rafId;

    document.addEventListener('mousemove', (e) => {
      if (rafId) cancelAnimationFrame(rafId);
      rafId = requestAnimationFrame(() => {
        spotlight.style.left = `${e.clientX}px`;
        spotlight.style.top  = `${e.clientY}px`;
        spotlight.style.opacity = '1';
      });
    });

    document.addEventListener('mouseleave', () => {
      spotlight.style.opacity = '0';
    });

    // Secure email — assembled from parts on click; never appears as mailto: in source
    document.querySelector('.email-link').addEventListener('click', function (e) {
      e.preventDefault();
      window.location.href = 'mailto:' + this.dataset.u + '\x40' + this.dataset.h;
    });

    // Mobile: gyroscope parallax — tilt device to explore the 3D scene
    (function () {
      if (!window.DeviceOrientationEvent) return;
      const scene = document.querySelector('.scene');
      let gyroRafId;
      let calibrated = false;
      let baseGamma = 0, baseBeta = 45;

      function handleGyro(e) {
        if (!calibrated) {
          baseGamma = e.gamma || 0;
          baseBeta  = e.beta  || 45;
          calibrated = true;
        }
        const dx = Math.max(-12, Math.min(12, (e.gamma - baseGamma) / 3.5));
        const dy = Math.max(-8,  Math.min(8,  (e.beta  - baseBeta)  / 4.5));
        if (gyroRafId) cancelAnimationFrame(gyroRafId);
        gyroRafId = requestAnimationFrame(() => {
          scene.style.transform = `translate(${dx * -1}px, ${dy * -0.6}px) scale(1.05)`;
        });
      }

      // iOS 13+ requires a user gesture to enable DeviceOrientationEvent
      function startGyro() {
        if (typeof DeviceOrientationEvent.requestPermission === 'function') {
          DeviceOrientationEvent.requestPermission()
            .then(state => { if (state === 'granted') window.addEventListener('deviceorientation', handleGyro); })
            .catch(() => {});
        } else {
          window.addEventListener('deviceorientation', handleGyro);
        }
      }

      // Only activate on touch devices
      if (navigator.maxTouchPoints > 0) {
        document.addEventListener('touchstart', startGyro, { once: true });
      }
    })();

    // ─── DHARMA Sequence Easter Egg ───
    (function () {
      const SEQ  = ['4', '8', '15', '16', '23', '42'];
      const DISP = ['04', '08', '15', '16', '23', '42'];
      const FILE_TEXT =
`░ CLASSIFIED ─ DHARMA PERSONNEL FILE ░
─────────────────────────────────────
SUBJECT       : FAJARDO, ANDRÉS
ROLE          : ARCHITECT (STN 04)
ORIGIN        : BOGOTÁ — COL
STATUS        : ACTIVE — SECTOR 07
AFFILIATIONS  : [REDACTED] × 3
NOTES         : known to break things
                on purpose. responds
                to coffee.
─────────────────────────────────────
"the numbers are bad."   — orientation 04`;

      let eggState = 'idle'; // idle | open | revealed
      let idx = 0;
      let twTimer = null;

      const terminal    = document.getElementById('dharma-terminal');
      const dhInput     = document.getElementById('dharma-input');
      const dhInputWrap = document.getElementById('dharma-input-wrap');
      const dhChips     = document.getElementById('dharma-chips');
      const dhHint      = document.getElementById('dharma-hint');
      const dhInitiate  = document.getElementById('dharma-initiate');
      const dhFile      = document.getElementById('dharma-file');
      const dhFileBody  = document.getElementById('dharma-file-body');
      const dhAck       = document.getElementById('dharma-ack');
      const dhPulse     = document.getElementById('dharma-pulse');
      const dhScene     = document.querySelector('.scene');
      const seqTrigger  = document.getElementById('seq-trigger');
      const seqNumbers  = document.querySelectorAll('.seq-number');
      const noMotion    = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

      function updateHint() {
        if (idx < SEQ.length) {
          dhHint.innerHTML = `awaiting <span class="dharma-hint__num">[${DISP[idx]}]</span>`;
        } else {
          dhHint.textContent = 'sequence complete — initiate';
        }
      }

      function resetTrack() {
        idx = 0;
        dhChips.innerHTML = '';
        dhInput.value = '';
        dhInput.maxLength = SEQ[0].length;
        dhInput.removeAttribute('disabled');
        updateHint();
        dhInitiate.classList.remove('is-visible');
        dhInitiate.setAttribute('tabindex', '-1');
        dhInitiate.setAttribute('aria-hidden', 'true');
      }

      function openTerminal(prefillChar) {
        if (eggState !== 'idle') return;
        eggState = 'open';
        resetTrack();
        terminal.removeAttribute('aria-hidden');
        terminal.dataset.state = 'open';
        dhInput.focus();
        if (prefillChar) { dhInput.value = prefillChar; tryCommit(); }
      }

      function closeTerminal() {
        if (eggState !== 'open') return;
        eggState = 'idle';
        delete terminal.dataset.state;
        terminal.setAttribute('aria-hidden', 'true');
        seqTrigger.focus();
      }

      function commit() {
        const chip = document.createElement('span');
        chip.className = 'dharma-chip';
        chip.textContent = DISP[idx];
        dhChips.appendChild(chip);
        idx++;
        dhInput.value = '';
        if (idx < SEQ.length) {
          dhInput.maxLength = SEQ[idx].length;
          updateHint();
        } else {
          dhInput.setAttribute('disabled', '');
          updateHint();
          dhInitiate.classList.add('is-visible');
          dhInitiate.removeAttribute('tabindex');
          dhInitiate.removeAttribute('aria-hidden');
          setTimeout(() => dhInitiate.focus(), 40);
        }
      }

      function shake() {
        dhInputWrap.classList.remove('dharma-shake');
        void dhInputWrap.offsetWidth;
        dhInputWrap.classList.add('dharma-shake');
        setTimeout(() => dhInputWrap.classList.remove('dharma-shake'), 300);
        dhInput.value = '';
      }

      function tryCommit() {
        if (idx >= SEQ.length) return;
        const val = dhInput.value.replace(/\D/g, '');
        dhInput.value = val;
        if (!val.length) return;
        const expected = SEQ[idx];
        if (val === expected) {
          commit();
        } else if (val.length >= expected.length || !expected.startsWith(val)) {
          shake();
        }
      }

      function typewriter(text, el, done) {
        let i = 0;
        function tick() {
          if (i < text.length) {
            el.textContent += text[i++];
            twTimer = setTimeout(tick, 18);
          } else {
            twTimer = null;
            if (done) done();
          }
        }
        tick();
      }

      function runReveal() {
        if (eggState !== 'open') return;
        eggState = 'revealed';

        // Collapse terminal
        delete terminal.dataset.state;
        terminal.setAttribute('aria-hidden', 'true');

        // Scene amber tint + flash
        dhScene.classList.add('scene--unlock');
        dhPulse.classList.remove('is-active');
        void dhPulse.offsetWidth;
        dhPulse.classList.add('is-active');
        dhPulse.addEventListener('animationend', () => dhPulse.classList.remove('is-active'), { once: true });

        // Stagger seq numbers
        const numDelay = noMotion ? 0 : 200;
        setTimeout(() => {
          seqNumbers.forEach((el, i) => {
            setTimeout(() => el.classList.add('seq-number--lit'), noMotion ? 0 : i * 65);
          });
        }, numDelay);

        // File slides in + typewriter
        const fileDelay = noMotion ? 0 : 320;
        setTimeout(() => {
          dhFileBody.textContent = '';
          dhFile.removeAttribute('aria-hidden');
          dhFile.dataset.state = 'open';
          if (noMotion) {
            dhFileBody.textContent = FILE_TEXT;
            dhAck.focus();
          } else {
            typewriter(FILE_TEXT, dhFileBody, () => dhAck.focus());
          }
        }, fileDelay);
      }

      function dismissReveal() {
        if (eggState !== 'revealed') return;
        eggState = 'idle';

        if (twTimer) { clearTimeout(twTimer); twTimer = null; }

        // Slide file out, then remove tint
        delete dhFile.dataset.state;
        dhFile.setAttribute('aria-hidden', 'true');
        setTimeout(() => dhScene.classList.remove('scene--unlock'), 450);
        seqNumbers.forEach(el => el.classList.remove('seq-number--lit'));
        setTimeout(() => { dhFileBody.textContent = ''; }, 750);

        seqTrigger.focus();
      }

      // Seq trigger: click & keyboard
      seqTrigger.addEventListener('click', () => openTerminal());
      seqTrigger.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openTerminal(); }
      });

      // Global '4' shortcut opens terminal and commits first number
      document.addEventListener('keydown', (e) => {
        if (e.key !== '4' || e.metaKey || e.ctrlKey || e.altKey) return;
        if (eggState !== 'idle') return;
        const tag = document.activeElement && document.activeElement.tagName;
        if (tag === 'INPUT' || tag === 'TEXTAREA') return;
        e.preventDefault();
        openTerminal('4');
      });

      // Input
      dhInput.addEventListener('input', tryCommit);
      dhInput.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') { closeTerminal(); return; }
        if (e.key === 'Enter' && idx >= SEQ.length) runReveal();
      });

      // Initiate
      dhInitiate.addEventListener('click', runReveal);
      dhInitiate.addEventListener('keydown', (e) => { if (e.key === 'Enter') runReveal(); });

      // ACK / dismiss
      dhAck.addEventListener('click', dismissReveal);

      // Esc from anywhere
      document.addEventListener('keydown', (e) => {
        if (e.key !== 'Escape') return;
        if (eggState === 'open') closeTerminal();
        else if (eggState === 'revealed') dismissReveal();
      });

      // Click outside terminal to close
      document.addEventListener('click', (e) => {
        if (eggState !== 'open') return;
        if (!terminal.contains(e.target) && e.target !== seqTrigger) closeTerminal();
      });

      // Focus trap inside terminal
      terminal.addEventListener('keydown', (e) => {
        if (e.key !== 'Tab') return;
        const focusable = [...terminal.querySelectorAll('input:not(:disabled), button:not([tabindex="-1"])')];
        if (!focusable.length) return;
        const first = focusable[0], last = focusable[focusable.length - 1];
        if (e.shiftKey && document.activeElement === first) { e.preventDefault(); last.focus(); }
        else if (!e.shiftKey && document.activeElement === last) { e.preventDefault(); first.focus(); }
      });
    })();
  </script>

</body>
</html>
